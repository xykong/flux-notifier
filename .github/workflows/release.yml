name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        working-directory: packages/core
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/core/dist/

  macos-release:
    name: Build and release macOS App
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        working-directory: packages/macos-app
        run: swift build -c release

      - name: Bundle .app
        working-directory: packages/macos-app
        run: bash build.sh

      - name: Create zip for Homebrew Cask
        working-directory: packages/macos-app/build
        run: |
          zip -r --symlinks FluxNotifier.zip FluxNotifier.app
          echo "MACOS_SHA256=$(shasum -a 256 FluxNotifier.zip | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/macos-app/build/FluxNotifier.zip
          generate_release_notes: true

  relay-docker:
    name: Push relay-server Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: packages/relay-server
          push: true
          tags: |
            flux-notifier/relay-server:latest
            flux-notifier/relay-server:${{ github.ref_name }}
