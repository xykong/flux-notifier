name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        working-directory: packages/core
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/core/dist/

  macos-release:
    name: Build macOS App
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        working-directory: packages/macos-app
        run: swift build -c release

      - name: Bundle .app
        working-directory: packages/macos-app
        run: bash build.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluxNotifier.app
          path: packages/macos-app/FluxNotifier.app/

  relay-docker:
    name: Push relay-server Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: packages/relay-server
          push: true
          tags: |
            flux-notifier/relay-server:latest
            flux-notifier/relay-server:${{ github.ref_name }}
