[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "flux-notifier"
version = "0.1.0"
description = "AI event notification system — push to all your devices from any AI program"
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["ai", "notification", "cli", "opencode"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Communications",
    "Topic :: Utilities",
]

dependencies = [
    "click>=8.1",
    "pydantic>=2.0",
    "httpx>=0.27",
    "anyio>=4.0",
    "aiosmtplib>=3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-httpx>=0.30",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.scripts]
notify = "flux_notifier.cli:cli"
flux-notifier = "flux_notifier.cli:cli"

[project.urls]
Homepage = "https://github.com/xykong/flux-notifier"
Repository = "https://github.com/xykong/flux-notifier"
Issues = "https://github.com/xykong/flux-notifier/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["flux_notifier*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["flux_notifier"]
omit = ["tests/*"]
